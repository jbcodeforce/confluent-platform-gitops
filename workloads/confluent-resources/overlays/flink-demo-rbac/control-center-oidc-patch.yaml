# Control Center OIDC SSO Configuration Patch
# Enables browser-based authentication via Keycloak OIDC
# SSO configuration is done in Kafka CR (provider.sso), this enables it in Control Center
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter
  namespace: kafka
spec:
  dependencies:
    mds:
      # Enable OIDC SSO protocol for browser-based authentication
      ssoProtocol: oidc
      # MDS endpoint (internal)
      endpoint: http://kafka.kafka.svc.cluster.local:8090
      # Token key pair for MDS authentication (shared public key)
      tokenKeyPair:
        secretRef: mds-token
      # Control Center service account authentication to MDS
      authentication:
        type: oauth
        oauth:
          secretRef: kafka-oauth-client
          configuration:
            tokenEndpointUri: http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token
