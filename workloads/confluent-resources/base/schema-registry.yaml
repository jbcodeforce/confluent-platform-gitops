apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  replicas: 1
  image:
    application: confluentinc/cp-schema-registry:8.2.0
    init: confluentinc/confluent-init-container:3.1.1

  # Dependencies - must wait for Kafka broker
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.kafka.svc.cluster.local:9092
---
##TODO BREAK THIS OUT INTO OVERLAY AS A NEW COMPONENT
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: schema-registry
  namespace: kafka
spec:
  routes:
  - kind: Rule 
    match: Host(`schema-registry.flink-demo.confluentdemo.local`)
    services:
    - name: schemaregistry
      port: 8081
      scheme: http