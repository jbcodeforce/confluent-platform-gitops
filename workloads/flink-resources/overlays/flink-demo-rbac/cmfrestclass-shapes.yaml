# CMFRestClass for shapes group namespace
# Configures how CFK communicates with CMF for Flink resources
apiVersion: platform.confluent.io/v1beta1
kind: CMFRestClass
metadata:
  name: cmf-rest-class
  namespace: flink-shapes
spec:
  cmfRest:
    # CMF service endpoint (internal cluster DNS)
    endpoint: http://cmf-service.operator.svc.cluster.local:80

    # OAuth authentication for CMF REST API calls
    # CFK uses this config when making requests to CMF on behalf of users
    authentication:
      type: oauth
      bearer:
        # Reference to secret containing the OAuth token or client credentials
        # This should be created separately with appropriate tokens
        secretRef: cmf-oauth-token
