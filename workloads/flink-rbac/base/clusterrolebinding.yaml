---
# ClusterRoleBinding for Flink admin
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flink-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flink-admin
subjects:
  - kind: ServiceAccount
    name: flink-admin
    namespace: default
